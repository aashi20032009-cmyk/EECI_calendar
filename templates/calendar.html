```html
<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>EECI Schedule</title>

<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.17/index.global.min.js"></script>

<style>

:root {
    --vanilla: #FFF7E6;
    --blush: #F7C8D3;
    --rosewood: #B46A72;
    --sage: #A8B58A;
    --misty: #A9B7C6;
    --midnight: #2D3A47;
}

* {
    box-sizing: border-box;
}

body {
    margin: 0;
    padding: 30px;
    font-family: "Segoe UI", sans-serif;
    background: var(--vanilla);
    color: var(--midnight);
}

.header {
    text-align: center;
    margin-bottom: 30px;
}

h1 {
    margin: 0;
    font-size: 2.5rem;
    color: var(--midnight);
}

.subtitle {
    margin-top: 8px;
    color: var(--rosewood);
    font-size: 1rem;
}

#calendar {
    background: white;
    padding: 20px;
    border-radius: 24px;
    box-shadow: 0 8px 30px rgba(45, 58, 71, 0.12);
}

/* Toolbar */

.fc-toolbar-title {
    color: var(--midnight);
    font-weight: 700;
}

.fc .fc-button {
    background: var(--midnight) !important;
    border: none !important;
    border-radius: 12px !important;
    padding: 8px 14px !important;
}

.fc .fc-button:hover {
    background: var(--rosewood) !important;
}

.fc .fc-button-primary:not(:disabled).fc-button-active {
    background: var(--rosewood) !important;
}

/* Calendar grid */

.fc-theme-standard td,
.fc-theme-standard th,
.fc-theme-standard .fc-scrollgrid {
    border-color: rgba(45, 58, 71, 0.12);
}

/* Events */

.fc-event {
    background: var(--misty) !important;
    border: none !important;
    border-radius: 8px !important;
    color: var(--midnight) !important;
    font-weight: 600;
    padding: 2px;
}

/* Today's date */

.fc-day-today {
    background: rgba(247, 200, 211, 0.35) !important;
}

.footer {
    text-align: center;
    margin-top: 20px;
    color: var(--rosewood);
    font-size: 0.9rem;
}

</style>

</head>

<body>

<div class="header">
    <h1>EECI Schedule</h1>
    <p class="subtitle">
        Class schedule calendar
    </p>
</div>

<div id="calendar"></div>

<div class="footer">
    Student-made calendar view of the EECI schedule
</div>

<script>

document.addEventListener('DOMContentLoaded', function () {

    var calendarEl = document.getElementById('calendar');

    var calendar = new FullCalendar.Calendar(calendarEl, {

        initialView: 'dayGridMonth',

        height: 'auto',

        events: {{ events|tojson|safe }},

        eventClick: function(info) {

            alert(
                info.event.title +
                "\n\n📍 Room: " +
                info.event.extendedProps.room +
                "\n🕒 Time: " +
                info.event.extendedProps.timing
            );

        }

    });

    calendar.render();

});

</script>

</body>
</html>
```
