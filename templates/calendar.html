<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>EECI Schedule</title>

<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.17/index.global.min.js"></script>

<style>

    :root {
        --vanilla: #FFF7E6;
        --blush: #F7C8D3;
        --rosewood: #B46A72;
        --sage: #A8B58A;
        --misty: #A9B7C6;
        --midnight: #2D3A47;
    }

    * {
        box-sizing: border-box;
    }

    body {
        margin: 0;
        padding: 30px;
        background: var(--vanilla);
        font-family: "Segoe UI", sans-serif;
        color: var(--midnight);
    }

    .container {
        max-width: 1400px;
        margin: 0 auto;
    }

    .header {
        text-align: center;
        margin-bottom: 30px;
    }

    .header h1 {
        margin: 0;
        font-size: 2.3rem;
        font-weight: 700;
        color: var(--midnight);
    }

    .subtitle {
        margin-top: 8px;
        color: var(--rosewood);
        font-size: 1rem;
    }

    #calendar {
        background: rgba(255, 255, 255, 0.75);
        backdrop-filter: blur(10px);
        border-radius: 24px;
        padding: 20px;
        box-shadow: 0 8px 30px rgba(45, 58, 71, 0.10);
    }

    /* FullCalendar toolbar */

    .fc-toolbar-title {
        color: var(--midnight);
        font-weight: 700;
    }

    .fc .fc-button {
        background: var(--midnight) !important;
        border: none !important;
        border-radius: 12px !important;
        padding: 8px 14px !important;
    }

    .fc .fc-button:hover {
        background: var(--rosewood) !important;
    }

    .fc .fc-button-primary:not(:disabled).fc-button-active {
        background: var(--rosewood) !important;
    }

    /* Calendar grid */

    .fc-theme-standard td,
    .fc-theme-standard th,
    .fc-theme-standard .fc-scrollgrid {
        border-color: rgba(45, 58, 71, 0.12);
    }

    .fc-col-header-cell {
        background: rgba(255, 255, 255, 0.35);
    }

    /* Events */

    .fc-event {
        background: var(--misty) !important;
        border: none !important;
        border-radius: 8px !important;
        color: var(--midnight) !important;
        font-weight: 600;
        padding: 2px;
    }

    /* Today's date */

    .fc-day-today {
        background: rgba(247, 200, 211, 0.35) !important;
    }

    .footer {
        margin-top: 20px;
        text-align: center;
        color: var(--rosewood);
        font-size: 0.9rem;
    }

    @media (max-width: 768px) {

        body {
            padding: 15px;
        }

        .header h1 {
            font-size: 1.8rem;
        }

        #calendar {
            padding: 10px;
        }
    }

</style>

</head>

<body>

<div class="container">

    <div class="header">
        <h1>EECI Schedule</h1>
        <p class="subtitle">Class schedule calendar</p>
    </div>

    <div id="calendar"></div>

    <div class="footer">
        Student-made calendar view of the EECI schedule
    </div>

</div>

<script>

    document.addEventListener('DOMContentLoaded', function () {

        const calendarEl = document.getElementById('calendar');

        const calendar = new FullCalendar.Calendar(calendarEl, {

            initialView: 'dayGridMonth',

            height: 'auto',

            events: {{ events|tojson|safe }},

            eventClick: function(info) {

                alert(
                    info.event.title +
                    "\n\n📍 Room: " +
                    info.event.extendedProps.room +
                    "\n🕒 Time: " +
                    info.event.extendedProps.timing
                );

            }

        });

        calendar.render();

    });

</script>

</body>
</html>
